<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Confete</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background: linear-gradient(45deg, #ff0080, #00d4ff, #fffb00);
    background-size: 400% 400%;
    animation: bg 6s infinite alternate;
    font-family: Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    100%{background-position:100% 50%;}
}

h1{
    font-size:60px;
    color:white;
    text-align:center;
    text-shadow:0 0 20px black;
    z-index:2;
}

.confete{
    position:fixed;
    width:10px;
    height:10px;
    top:-10px;
    animation: cair linear forwards;
}

@keyframes cair{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}
</style>
</head>

<body>

<h1>vão se fuder meninas e eduardo do antisocial club</h1>

<script>
function criarConfete(){
    const confete = document.createElement("div");
    confete.classList.add("confete");

    const cores = ["red","blue","yellow","green","purple","orange","pink"];
    confete.style.background = cores[Math.floor(Math.random()*cores.length)];

    confete.style.left = Math.random()*100 + "vw";
    confete.style.animationDuration = (Math.random()*3 + 2) + "s";

    document.body.appendChild(confete);

    setTimeout(()=>{
        confete.remove();
    },5000);
}

setInterval(criarConfete,120);
</script>

</body>
</html>
